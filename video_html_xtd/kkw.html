<!DOCTYPE html>
<html>
	<head>
		<script src="./js/jquery.min.js"></script>
		<script src="NodePlayer.v3.min.js"></script>
		<script language="JavaScript" type="text/JavaScript">
			/**
	弹出iframe页面(iframe后面会添加灰色蒙版)
	**/
	function showIframe(url){
	    $("<iframe id='YuFrameMobilePreview' name='YuFrameMobilePreview'   ></iframe>" ).prependTo('body');  
	  
	     $("#YuFrameMobilePreview").attr("src", url);  
	} 
	


	//播放flv格式视频
	function showFlv(url){
	    $("<canvas  id='videoCanvas' name='videoCanvas'  width='1980' height='1080' ></canvas>" ).prependTo('body');  
	   
    $(function(){
        var canvas = document.getElementById("videoCanvas");
        var player1=null;
        var startFunc = function (url) {
            player1.start(url);
        }
        var stopFunc = function () {
            player1.stop();
        }
        initNodeplayer(url);
    });
	}
//获取url请求参数
function getQueryVariable(variable){
       var query = window.location.search.substring(1);
       var vars = query.split("&");
       for (var i=0;i<vars.length;i++) {
               var pair = vars[i].split("=");
               if(pair[0] == variable){return pair[1];}
       }
       return(false);
}


function initNodeplayer(url){
    try {
        player1 = new NodePlayer();
        player1.start(url);
        player1.setView('videoCanvas');
        player1.setScaleMode(0);
        player1.setBufferTime(1000);
        player1.skipLoopFilter(32);
        player1.on('start', () => {
        });
        player1.on('error', (e) => {
        });
        player1.on('stop', () => {
        });
    }
    catch (e) {
        console.log('catch');
    }
}
	</script>
	<style type="text/css">

 

			#YuFrameMobilePreview {
				border: none;
				width: 1000px;
				height: 1000px;
				margin: 5% 10% ;
			}
         	#videoCanvas {
        				border: none;
        				width:80%;
        				height: 80%;
        				margin: 5% 10% ;
        			}
	</style>
</head>
<body>

<script language="JavaScript" type="text/JavaScript">
	var videoUrl = window.location.href;
	videoUrl = videoUrl.match(/link=(\S*)/)[1];
	   if(videoUrl){
                  if(videoUrl.indexOf('flv')==-1){
                      	showIframe(videoUrl);
                      //this.canvaOrIframe =  1;
                  }else{
                      showFlv(videoUrl);
                      //this.canvaOrIframe =  0;
                  }
                }
</script>
</body>
