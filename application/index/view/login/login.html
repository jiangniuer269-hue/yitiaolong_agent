<div class="header"><h1 style="color: snow;margin-left: 20px">欢迎使用，代理管理后台</h1></div>
<div class="loginWraper">
    <div id="loginform" class="loginBox">
        <form class="form form-horizontal" method="post">
            <div class="row cl">
                <label class="form-label col-xs-3"><i class="Hui-iconfont">&#xe60d;</i></label>
                <div class="formControls col-xs-8">
                    <input id="account" name="account" type="text" placeholder="账户" class="input-text size-L">
                </div>
            </div>
            <div class="row cl">
                <label class="form-label col-xs-3"><i class="Hui-iconfont">&#xe60e;</i></label>
                <div class="formControls col-xs-8">
                    <input id="password" name="password" type="password" placeholder="密码" class="input-text size-L">
                </div>
            </div>

            <div class="row cl">
                <div class="formControls col-xs-8 col-xs-offset-3">
                    <input id="doLogin" type="button" class="btn btn-success radius size-L"
                           value="&nbsp;登&nbsp;&nbsp;&nbsp;&nbsp;录&nbsp;">
                    <input type="reset" class="btn btn-default radius size-L"
                           value="&nbsp;取&nbsp;&nbsp;&nbsp;&nbsp;消&nbsp;">
                </div>
            </div>
        </form>
    </div>
</div>
<div class="footer">Copyright 过江龙</div>
<script type="text/javascript" src="/lib/jquery/1.9.1/jquery.min.js"></script>
<script type="text/javascript" src="/static/h-ui/js/H-ui.min.js"></script>
<script type="text/javascript" src="/lib/layer/2.4/layer.js"></script>
<script>
    $(function () {
        $('#doLogin').click(function () {
            var account = $('#account').val();
            var password = $('#password').val();
            if (account == '' || password == '') {
                layer.msg('账号或密码不能为空', {icon: 2,time:1000});
                return false;
            }
            $.ajax({
                url: "/login/doLogin",
                dataType: "json",
                type: "post",
                data: {
                    "account": account,
                    "password": password
                },
                success: function (returns) {
                    if (returns.code == 200) {
                        layer.msg(returns.msg, {icon: 1}, function () {
                            window.location.href='/index/index';
                        });
                        return false;
                    }else {
                        layer.msg(returns.msg, {icon: 2,time:1000}, function () {
                            window.location.href='/login/index';
                        });
                        return false;
                    }
                }
            })
        })
    })
</script>
