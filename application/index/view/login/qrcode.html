
<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name='viewport' content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' />
<meta name='apple-mobile-web-app-capable' content='yes' />
<meta name='full-screen' content='true' />
<meta name='screen-orientation' content='portrait' />
<meta name='x5-fullscreen' content='true' />
<meta name='360-fullscreen' content='true' />
<title>二维码</title>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
<script type="text/javascript">
    var imInfo = {};
    var playid = localStorage.getItem("playid");
        $(function () {
            var url = "{$url}";
            url = url.replace(/&amp;/, "&");
            console.log(url);
            $('#code').qrcode(url);
            let canvas = $('#code canvas').get(0);
            $('.xiazai').click(()=>{
                let href = canvas.toDataURL() // 获取canvas对应的base64编码
                let a = document.createElement('a') // 创建a标签
                a.download = "游戏二维码" // 设置图片名字
                a.href = href
                a.dispatchEvent(new MouseEvent('click'))
            })

            $(".clickme").click(()=>{
                $(".imchatwrapper").show();
                if(!$("iframe").attr("src")){
                    $.ajax({
                    type: "POST",
                    url: "/v1/qrcode/im_login_auth",
                    data: {
                        playid:playid
                    },
                    dataType: "json",
                    success: function(res){
                        imInfo = res.data;
                        imInfo.imdomain = res.imdomain;
                        imInfo.playid = res.playid;
                        imInfo.toid = res.toid;
                        localStorage.setItem('playid',imInfo.playid);
                        $("iframe").attr("src",()=>{
                            return imInfo.imdomain+"?"+Object.keys(imInfo).map((key)=> {
                                // body...
                                return encodeURIComponent(key) + "=" + encodeURIComponent(imInfo[key]);
                            }).join("&")+'/#/gm_messages/messageChat/'+imInfo.channelId
                        })
                    }
                });
                }
            })
            $(".imchatwrapper").click((e)=>{
                if(e.target.className == "imchatwrapper"){
                    $(".imchatwrapper").hide();
                }
            })
        })
</script>
</head>

<body>
    <div  class="imchatwrapper">
        <div class="imchat">
          <iframe  width="100%" height="100%" frameborder="no" border="0" marginwidth="0" marginheight="0" scrolling="no" allowtransparency="yes"></iframe>
        </div>
      </div>

    <div id="main">
        <div class="demo">
        <p>请保存图片使用浏览器或者微信打开进入游戏。</p>
        <div id="code"></div>
        <div class="contact"><span class="clickme">联系客服</span></div>    
        </div>
</body>
<style>

        text-align: center;
        font-size: 24px;
        margin-top: 20px;
    }

        background-color: #6397EC;

        margin: 0 auto;
        height: 30px;
        line-height: 30px;

        border: 1px solid #D3DEED;
        border-radius: 4px;
        padding: 5px 20px;
    }
    .demo p{

    }
    .imchatwrapper {
    position: absolute;
    left: 0px;
    right: 0px;
    bottom: 0px;
    top: 0px;
    background: none;
    border-top: 1px solid #ccc;

}

    position: absolute;
    left: 0px;
    right: 0px;
    bottom: 0px;

    #code canvas{
        position: relative;
        left:50%;
        margin-left: -125px;
    }
