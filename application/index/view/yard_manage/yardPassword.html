{extend name="base" /}
{block name="content"}
<div class="pd-20">
    <form class="Huiform" id="loginform" method="post">
        <table class="table table-border table-bordered table-bg">
            <thead>
            <tr>
                <th colspan="2">码粮结算密码</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <th class="text-r">请输入密码：</th>
                <td><input name="password" id="password" class="input-text" type="password" autocomplete="off"
                           tabindex="2" datatype="*6-16" nullmsg="请输入密码！" errormsg="4~16个字符，区分大小写！">
                </td>
            </tr>
            <tr>
                <th></th>
                <td>
                    <button type="button" class="btn btn-success radius" id="admin-password-save"
                            name="admin-password-save"><i class="icon-ok"></i> 确定
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </form>
</div>

<script type="text/javascript">
    //表单验证
    $("#loginform").validate({
        rules: {
            password: {
                required: true,
            },
        },
        debug: false,
        onkeyup: false,
        focusCleanup: true,
        success: "valid",
    });

    $("#admin-password-save").click(function () {
        if ($("#loginform").valid()) {
            var object = {
                url: "/yard/count_yard",　　　　　　//form提交数据的地址
                type: "post",　　　  //form提交的方式(method:post/get)
                target: "returns",　　//服务器返回的响应数据显示的元素(Id)号
                data: {
                    password: $('#password').val()
                },
                beforeSerialize: function () {
                }, //序列化提交数据之前的回调函数
                beforeSubmit: function () {
                },　　//提交前执行的回调函数
                success: function (returns) {
                    if (returns.code == 200) {
                        layer.msg(returns.msg, {icon: 1, time: 1000}, function () {
                            window.parent.location.reload(); //刷新父页面
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            return false;
                        });
                    } else {
                        layer.msg(returns.msg, {icon: 2, time: 1000});
                        return false;
                    }
                },　　　　   //提交成功后执行的回调函数
                error: function () {
                },             //提交失败执行的函数
                dataType: "json",　　　　　　　//服务器返回数据类型
                clearForm: true,　　　　　　 //提交成功后是否清空表单中的字段值
                restForm: true,　　　　　　  //提交成功后是否重置表单中的字段值，即恢复到页面加载时的状态
                timeout: 6000 　　　　　 　 //设置请求时间，超过该时间后，自动退出请求，单位(毫秒)。　　
            };
            $("#loginform").ajaxSubmit(object);
        }
    })
</script>
{/block}
