        <div  style="width: 45%;height:100%;float: left">

                    <input type="hidden" name="chatHistoryId" id="chatHistoryId" value="{$chatHistoryId}">
                    <a style="display: block;color: #00B83F" href="javascript:void(0)" onclick="chatLog()">上一局消息记录</a>
                </div>
                <ul>
                    <!--群聊内容-->
                </ul>
            </div>

            <div style="width: 100%;height: auto;border: solid 1px #c2ccd1;">
                <script id="editor" type="text/plain" style="width:100%;height:120px;"></script>
                <button style="width: 100px;height: 30px;color: #faffff;font-size: larger;position: relative;left: 420px;bottom: 2px"

                </button>

</div>
<script type="text/javascript" charset="utf-8" src="/ueditor/ueditor.config.js"></script>
<script type="text/javascript" charset="utf-8" src="/ueditor/ueditor.all.js"></script>
<script type="text/javascript" charset="utf-8" src="/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .edui-default .edui-editor {
        border: none;
    }
</style>
<script type="text/javascript">
    function escape2Html(str) {
        var str = str.replace(/<(?!img).*?>/g, "");
        var arrEntities = {'lt': '<', 'gt': '>', 'nbsp': ' ', 'amp': '&', 'quot': '"'};
        return str.replace(/&(lt|gt|nbsp|amp|quot);/ig, function (all, t) {
            return arrEntities[t];
        });
    }
    //实例化编辑器
    //建议使用工厂方法getEditor创建和引用编辑器实例，如果在某个闭包下引用该编辑器，直接调用UE.getEditor('editor')就能拿到相关的实例
    var ue = UE.getEditor('editor');

    // TODO Submit message
    function fasong() {
        var conter = ue.getContent();
        conter = escape2Html(conter.replace(/(\r\n|\n)/g, "<br>"));
        var containsImage = conter.search(/<img /i);
        if (conter != "" && containsImage == -1) {
            sendWs(JSON.stringify({"cmd": 3005, 'admin_msg': conter}));
        } else if (conter != "" && containsImage == 0) {
            var web_domain = $('#web_domain').val();
            var img = $(conter).attr("src");
            var img_url = "http://" + web_domain + img;
            sendWs(JSON.stringify({"cmd": 3005, 'admin_img_url': img_url}));
        } else {
            alert('发送内容不能为空');
            return;
        }
        setContent("");
    }


    function isFocus(e) {
        alert(UE.getEditor('editor').isFocus());
        UE.dom.domUtils.preventDefault(e)
    }
    function setblur(e) {
        UE.getEditor('editor').blur();
        UE.dom.domUtils.preventDefault(e)
    }
    function insertHtml() {
        var value = prompt('插入html代码', '');
        UE.getEditor('editor').execCommand('insertHtml', value)
    }
    function createEditor() {
        enableBtn();
        UE.getEditor('editor');
    }
    function getAllHtml() {
        alert(UE.getEditor('editor').getAllHtml())
    }
    function getContent() {
        var arr = [];
        arr.push("使用editor.getContent()方法可以获得编辑器的内容");
        arr.push("内容为：");
        arr.push(UE.getEditor('editor').getContent());
        alert(arr.join("\n"));
    }
    function getPlainTxt() {
        var arr = [];
        arr.push("使用editor.getPlainTxt()方法可以获得编辑器的带格式的纯文本内容");
        arr.push("内容为：");
        arr.push(UE.getEditor('editor').getPlainTxt());
        alert(arr.join('\n'))
    }
    function setContent(isAppendTo) {
        //var arr = [];
        //arr.push("使用editor.setContent('欢迎使用ueditor')方法可以设置编辑器的内容");
        UE.getEditor('editor').setContent(isAppendTo);
        // alert(arr.join("\n"));
    }
    function setDisabled() {
        UE.getEditor('editor').setDisabled('fullscreen');
        disableBtn("enable");
    }

    function setEnabled() {
        UE.getEditor('editor').setEnabled();
        enableBtn();
    }

    function getText() {
        //当你点击按钮时编辑区域已经失去了焦点，如果直接用getText将不会得到内容，所以要在选回来，然后取得内容
        var range = UE.getEditor('editor').selection.getRange();
        range.select();
        var txt = UE.getEditor('editor').selection.getText();
        alert(txt)
    }

    function getContentTxt() {
        var arr = [];
        arr.push("使用editor.getContentTxt()方法可以获得编辑器的纯文本内容");
        arr.push("编辑器的纯文本内容为：");
        arr.push(UE.getEditor('editor').getContentTxt());
        alert(arr.join("\n"));
    }
    function hasContent() {
        var arr = [];
        arr.push("使用editor.hasContents()方法判断编辑器里是否有内容");
        arr.push("判断结果为：");
        arr.push(UE.getEditor('editor').hasContents());
        alert(arr.join("\n"));
    }
    function setFocus() {
        UE.getEditor('editor').focus();
    }
    function deleteEditor() {
        disableBtn();
        UE.getEditor('editor').destroy();
    }
    function disableBtn(str) {
        var div = document.getElementById('btns');
        var btns = UE.dom.domUtils.getElementsByTagName(div, "button");
        for (var i = 0, btn; btn = btns[i++];) {
            if (btn.id == str) {
                UE.dom.domUtils.removeAttributes(btn, ["disabled"]);
            } else {
                btn.setAttribute("disabled", "true");
            }
        }
    }
    function enableBtn() {
        var div = document.getElementById('btns');
        var btns = UE.dom.domUtils.getElementsByTagName(div, "button");
        for (var i = 0, btn; btn = btns[i++];) {
            UE.dom.domUtils.removeAttributes(btn, ["disabled"]);
        }
    }

    function getLocalData() {
        alert(UE.getEditor('editor').execCommand("getlocaldata"));
    }

    function clearLocalData() {
        UE.getEditor('editor').execCommand("clearlocaldata");
        alert("已清空草稿箱")
    }
    /**
     * 关闭快捷消息
     */
    function closeFastMsg() {
        $(".fastmsg").css("display", "none");
    }

    /**
     * 获取快捷消息
     * @param _this
     */
    function getFastMsg(_this) {
        var msg = $(_this).html();
        setContent(msg);
        // var conter = $('.fastmsg').parent().find("textarea").val(msg);
        $(".fastmsg").css("display", "none");
    }
</script>
{/block}
